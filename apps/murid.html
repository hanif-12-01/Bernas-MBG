<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Siswa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useState } = React;

const KEY = "mbg_poc_state_v1";
const SSO_KEY = "mbg_sso_session";

const defaultState = () => ({ status: "MenungguUpload", items: [], complaints: [], logs: [], vendorName: "-", weekStart: "-", yoloStatus: "pending", ebastStatus: "none", bospStatus: "menunggu" });
const readState = () => { try { const raw = localStorage.getItem(KEY); return raw ? JSON.parse(raw) : defaultState(); } catch { return defaultState(); } };
const saveState = (state) => localStorage.setItem(KEY, JSON.stringify({ ...state, updatedAt: new Date().toLocaleString("id-ID") }));
const readSSO = () => { try { return JSON.parse(localStorage.getItem(SSO_KEY) || "null"); } catch { return null; } };

function Login({ onLogin }) {
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [role, setRole] = useState("siswa");
  const disabled = !username.trim() || !password.trim();

  return (
    <div className="min-h-screen flex items-center justify-center p-4 bg-indigo-950" style={{ fontFamily: "Manrope, sans-serif" }}>
      <div className="w-full max-w-sm rounded-3xl border border-indigo-400/30 bg-indigo-900/50 p-6 space-y-4 text-indigo-100 shadow-2xl">
        <h1 className="text-2xl font-extrabold text-white">Login Multi-Peran SSO</h1>
        <input value={username} onChange={(e) => setUsername(e.target.value)} placeholder="Username" className="w-full rounded-xl bg-indigo-950 border border-indigo-500/50 px-3 py-2" />
        <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Password" className="w-full rounded-xl bg-indigo-950 border border-indigo-500/50 px-3 py-2" />
        <select value={role} onChange={(e) => setRole(e.target.value)} className="w-full rounded-xl bg-indigo-950 border border-indigo-500/50 px-3 py-2">
          <option value="siswa">Siswa</option>
          <option value="walimurid">Wali Murid</option>
          <option value="guru">Guru</option>
        </select>
        <button disabled={disabled} onClick={() => onLogin({ username: username.trim(), role })} className={`w-full rounded-xl py-2.5 font-bold ${disabled ? "bg-indigo-900 text-indigo-300" : "bg-indigo-500 text-white"}`}>Masuk</button>
      </div>
    </div>
  );
}

function SiswaApp({ onLogout }) {
  const [tab, setTab] = useState("home");
  const [state, setState] = useState(readState());
  const [text, setText] = useState("");

  useEffect(() => {
    const sync = () => setState(readState());
    window.addEventListener("storage", sync);
    const t = setInterval(sync, 2500);
    return () => { window.removeEventListener("storage", sync); clearInterval(t); };
  }, []);

  const addLog = (draft, msg) => [{ id: Date.now(), at: new Date().toLocaleTimeString("id-ID"), message: msg }, ...(draft.logs || [])].slice(0, 80);

  const sendAspiration = () => {
    if (!text.trim()) return;
    const severity = /muntah|keracunan|darah|krit|pingsan|diare/i.test(text) ? "critical" : "normal";
    const complaint = { id: Date.now(), actor: "siswa", text: text.trim(), severity, at: new Date().toLocaleString("id-ID") };
    const next = { ...state, complaints: [complaint, ...(state.complaints || [])] };
    next.logs = addLog(next, `Siswa kirim keluhan/aspirasi (${severity}).`);
    if (severity === "critical") {
      next.publicValidation = "keluhan_kritis";
      next.ebastStatus = "ditahan_investigasi";
      next.bospStatus = "ditahan";
      next.logs = addLog(next, "Red alert dipicu oleh laporan siswa.");
    }
    saveState(next);
    setState(next);
    setText("");
    setTab("history");
  };

  return (
    <div className="min-h-screen bg-indigo-900 flex items-center justify-center p-3" style={{ fontFamily: "Manrope, sans-serif" }}>
      <div className="w-[390px] max-w-full h-[92vh] bg-slate-50 rounded-[28px] border-4 border-indigo-900 shadow-2xl overflow-hidden flex flex-col relative">
        <header className="bg-indigo-700 text-white px-4 py-3">
          <p className="text-xs text-indigo-200">App Pengguna - Siswa</p>
          <h1 className="text-lg font-extrabold">Pantau Menu Harian MBG</h1>
        </header>

        <main className="flex-1 overflow-y-auto p-3 pb-24 space-y-3">
          {tab === "home" && (
            <>
              <div className="rounded-2xl bg-white border border-slate-200 p-3 text-sm">
                <p className="font-semibold text-slate-700">Status: {state.status}</p>
                <p className="text-slate-600">Vendor: {state.vendorName}</p>
                <p className="text-xs text-slate-500">E-BAST: {state.ebastStatus} | BOSP: {state.bospStatus}</p>
              </div>
              {state.items?.map((item) => (
                <article key={item.day} className="rounded-2xl bg-white border border-slate-200 p-3">
                  <p className="font-bold text-slate-800 text-sm">{item.day}</p>
                  <p className="text-xs text-slate-600">{item.menu}</p>
                  {item.photoData && <img src={item.photoData} alt={item.day} className="mt-2 w-full h-44 object-cover rounded-xl border border-slate-200" />}
                </article>
              ))}
              {!state.items?.length && <div className="rounded-2xl bg-white border border-slate-200 p-3 text-sm text-slate-500">Belum ada menu dari SPPG.</div>}
            </>
          )}

          {tab === "aspirasi" && (
            <section className="rounded-2xl bg-white border border-slate-200 p-4 space-y-3">
              <h2 className="font-bold text-slate-800">Kirim Keluhan / Aspirasi</h2>
              <textarea value={text} onChange={(e) => setText(e.target.value)} className="w-full rounded-xl border border-slate-300 px-3 py-2 min-h-28" placeholder="Contoh: makanan kurang matang atau menimbulkan gejala." />
              <button onClick={sendAspiration} className="w-full rounded-xl bg-indigo-700 text-white font-bold px-4 py-2">Kirim</button>
            </section>
          )}

          {tab === "history" && (
            <section className="rounded-2xl bg-white border border-slate-200 p-4 space-y-2">
              <h2 className="font-bold text-slate-800">Riwayat Keluhan</h2>
              {(state.complaints || []).filter((x) => x.actor === "siswa").map((row) => (
                <div key={row.id} className="rounded-lg border border-slate-200 px-3 py-2">
                  <p className="text-sm text-slate-700">{row.text}</p>
                  <p className="text-xs text-slate-500 mt-1">{row.at} - {row.severity}</p>
                </div>
              ))}
              {!state.complaints?.some((x) => x.actor === "siswa") && <p className="text-sm text-slate-500">Belum ada riwayat.</p>}
              <button onClick={onLogout} className="w-full rounded-xl bg-slate-800 text-white font-bold px-4 py-2 mt-2">Logout</button>
            </section>
          )}
        </main>

        <nav className="absolute bottom-3 left-1/2 -translate-x-1/2 w-[350px] max-w-[92%] rounded-2xl bg-white border border-slate-200 shadow-lg px-2 py-2 flex justify-around">
          {[{id:"home",label:"Home",icon:"🏠"},{id:"aspirasi",label:"Aspirasi",icon:"💬"},{id:"history",label:"Riwayat",icon:"📋"}].map((item) => (
            <button key={item.id} onClick={() => setTab(item.id)} className={`flex flex-col items-center text-[11px] px-2 py-1 rounded-lg ${tab===item.id ? "text-indigo-700 bg-indigo-50" : "text-slate-500"}`}>
              <span className="text-base">{item.icon}</span><span>{item.label}</span>
            </button>
          ))}
        </nav>
      </div>
    </div>
  );
}

function App() {
  const [session, setSession] = useState(() => {
    const s = readSSO();
    return s && s.role === "siswa" ? s : null;
  });

  const handleLogin = (payload) => {
    localStorage.setItem(SSO_KEY, JSON.stringify(payload));
    if (payload.role === "guru") { window.location.href = "guru.html"; return; }
    if (payload.role === "walimurid") { window.location.href = "wali.html"; return; }
    setSession(payload);
  };

  const handleLogout = () => {
    localStorage.removeItem(SSO_KEY);
    setSession(null);
  };

  if (!session) return <Login onLogin={handleLogin} />;
  return <SiswaApp onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
